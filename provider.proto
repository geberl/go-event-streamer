syntax = "proto3";

package provider;
option go_package = "./provider";

message DataChunk {
  string content = 1;
}

service Streamer {
  // Unary (Synchronous) call
  rpc GetStatus(DataChunk) returns (DataChunk);

  // Bidirectional stream
  rpc EchoStream(stream DataChunk) returns (stream DataChunk);
}
